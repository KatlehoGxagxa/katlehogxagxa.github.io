<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="fontawesome/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="nav-prof-section">
        <nav class="navigation">
            <a href="home.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>


    <footer class="site-footer">
        <p class="footer-copy">
            <i class="fa-regular fa-copyright" aria-hidden="true"></i>
            <span id="footer-year"></span> Katleho Gxagxa. All rights reserved.
        </p>
    </footer>
    <script>document.getElementById('footer-year').textContent = new Date().getFullYear();</script>

    <script>
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';

        document.querySelectorAll('.navigation a').forEach(link => {
            const linkPage = link.getAttribute('href').split('/').pop();
            if (linkPage === currentPage) {
                link.classList.add('active');
            }
        });
    </script>   
</body>
</html>
